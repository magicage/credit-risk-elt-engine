# docker-compose.yml
services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: credit_dev
      POSTGRES_PASSWORD: devpass123
      POSTGRES_DB: credit_risk_db
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./scripts/db:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U credit_dev -d credit_risk_db"]
      interval: 5s
      timeout: 3s
      retries: 5

  dev:
    build:
      context: .
      dockerfile: Dockerfile
    working_dir: /app
    volumes:
      - .:/app 
    environment:
      - DATABASE_URL=postgresql://credit_dev:devpass123@postgres:5432/credit_risk_db
      - PGPASSWORD=devpass123
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pg_data: