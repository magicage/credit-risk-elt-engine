engine:
  version: "1.0"
  environment: "dev"
  
ingestion:
  source_type: "postgresql"
  batch_size: 1000
  watermark_column: "created_at"
  
transformation:
  dbt_project_dir: "./dbt_project"
  profiles_dir: "./dbt_project/.dbt"
  full_refresh_schedule: ["0 0 1 * *"]  # 每月1号全量
  incremental_filter: "created_at >= '{{ var('run_date') }}' - interval '1 day'"
  
quality:
  freshness_threshold_hours: 24
  test_fail_action: "alert_and_continue"  # 或 "fail_fast"
  pd_score_range: [0.001, 0.99]
  
observability:
  log_level: "INFO"
  metrics_output: "./monitoring/metrics/"
  alert_channels: ["slack", "email"]