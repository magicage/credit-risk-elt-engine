name: dbt CI/CD Pipeline

on:
  pull_request:
    branches: [main, develop]
    paths:
      - 'dbt_project/**'
      - '.github/workflows/dbt-ci.yml'

jobs:
  dbt-ci:
    runs-on: ubuntu-latest
    env:
      # 
      SNOWFLAKE_ACCOUNT: ${{ secrets.SNOWFLAKE_ACCOUNT }}
      SNOWFLAKE_USER: ${{ secrets.SNOWFLAKE_USER }}
      SNOWFLAKE_PASSWORD: ${{ secrets.SNOWFLAKE_PASSWORD }}
      SNOWFLAKE_ROLE: ${{ secrets.SNOWFLAKE_ROLE }}
      SNOWFLAKE_WAREHOUSE: ${{ secrets.SNOWFLAKE_WAREHOUSE }}
      SNOWFLAKE_DATABASE: ${{ secrets.SNOWFLAKE_DATABASE }}
      # 
      SNOWFLAKE_SCHEMA: CI_${{ github.run_id }}
      DBT_PROFILES_DIR: ${{ github.workspace }}/dbt_project/.dbt

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dbt & Dependencies
        run: |
          pip install dbt-core dbt-snowflake
          cd dbt_project && dbt deps

      - name: Create CI Schema
        run: |
          cd dbt_project
          dbt run-operation create_ci_schema --target ci

      - name: Run dbt Build (Run + Test)
        run: cd dbt_project && dbt build --target ci

      - name: Cleanup CI Schema (Always)
        if: always()
        run: |
          cd dbt_project
          dbt run-operation drop_ci_schema --target ci

      - name: Report Results to PR
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            // 
            const status = context.status === 'success' ? '✅ PASS' : ' FAIL';
            const runId = process.env.GITHUB_RUN_ID;
            const prNumber = context.payload.pull_request.number;
            
            github.rest.issues.createComment({
              issue_number: prNumber,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `### 🤖 dbt CI/CD Result: ${status}
              
            **Run ID**: \`${runId}\`  
            **Test Schema**: \`CI_${runId}\`  
            **PR**: #${prNumber}
            
            ${status === '✅ PASS' ? 'All tests passed! Ready to merge.' : 'Some tests failed. Please review logs.'}
            
            <details>
            <summary>View detailed logs</summary>
            Go to Actions tab → Workflow run #${runId}
            </details>`
            })
