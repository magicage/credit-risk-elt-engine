name: dbt CI Pipeline

on:
  pull_request:
    branches: [main, develop]
    paths:
      - 'dbt_project/**'
      - '.github/workflows/dbt-ci.yml'

jobs:
  dbt-test:
    runs-on: ubuntu-latest
    env:
      DBT_PROFILES_DIR: ${{ github.workspace }}/dbt_project/.dbt
      SNOWFLAKE_ACCOUNT: ${{ secrets.SNOWFLAKE_ACCOUNT }}
      SNOWFLAKE_USER: ${{ secrets.SNOWFLAKE_USER }}
      SNOWFLAKE_PASSWORD: ${{ secrets.SNOWFLAKE_PASSWORD }}
      SNOWFLAKE_ROLE: ${{ secrets.SNOWFLAKE_ROLE }}
      SNOWFLAKE_WAREHOUSE: ${{ secrets.SNOWFLAKE_WAREHOUSE }}
      SNOWFLAKE_DATABASE: ${{ secrets.SNOWFLAKE_DATABASE }}
      SNOWFLAKE_SCHEMA: CI_${{ github.run_id }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dbt & Dependencies
        run: |
          pip install dbt-core dbt-snowflake
          cd dbt_project && dbt deps

      - name: Compile & Validate Graph
        run: cd dbt_project && dbt compile --target dev

      - name: Run Data Tests
        run: cd dbt_project && dbt test --target dev

      - name: Report Results to PR
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const status = process.env.ACTIONS_STATUS === 'success' ? '✅ Passed' : ' Failed';
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `### 🤖 dbt CI Result: ${status}\n- Compile: ${{ job.status == 'success' }}\n- Tests: ${{ job.status == 'success' }}\n- Schema: \`CI_${context.runId}\`\n\n> Review artifacts in Actions tab.`
            })