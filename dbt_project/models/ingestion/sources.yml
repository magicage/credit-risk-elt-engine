version: 2

sources:
  - name: credit_risk_src
    database: credit_risk_db
    schema: RAW
    description: "Local PostgreSQL mock database for credit risk raw data"
    config:
      freshness:
        warn_after: { count: 24, period: hour }
        error_after: { count: 48, period: hour }
    tables:
      - name: customers
        description: "Raw customer demographic & employment data"
        columns:
          - name: customer_id
            description: "Primary key, UUID"
            tests:
              - unique
              - not_null
      - name: loans
        description: "Raw loan origination & status records"
        columns:
          - name: loan_id
            description: "Primary key, UUID"
            tests:
              - unique
              - not_null
          - name: customer_id
            description: "Foreign key to customers"
            tests:
              - not_null
              - relationships:
                  arguments:
                    to: source('credit_risk_src', 'customers')
                    field: customer_id
      - name: transactions
        description: "Raw repayment & fee transactions"
        config:
          loaded_at_field: created_at
          freshness:
            warn_after: { count: 12, period: hour }

      - name: fraud_logs  # new JSON source
        description: "Raw semi-structured fraud detection logs (JSON payload)"
        columns:
          - name: log_id
            tests:
              - unique
              - not_null